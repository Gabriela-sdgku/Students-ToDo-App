name: iOS App Validation

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    # Use macOS 15 (Sequoia) to support Xcode 16 project formats
    runs-on: macos-15 
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Xcode Version
        # This points the runner to the specific Xcode 16.0 app bundle
        run: sudo xcode-select -s /Applications/Xcode_16.0.app

      - name: Build and Run Tests
        run: |
          xcodebuild test \
            -scheme "ToDo Task" \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=18.0' \
            -quiet
